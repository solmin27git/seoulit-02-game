<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>2048 — 슬라이드 퍼즐</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrap">
    <header class="hd">
      <h1>2048</h1>
      <div class="scores">
        <div class="score">
          <span>점수</span>
          <strong id="score">0</strong>
        </div>
        <div class="score score--best">
          <span>최고</span>
          <strong id="best">0</strong>
        </div>
      </div>
    </header>

    <p class="lead">
      <strong>방향키</strong>(또는 <strong>스와이프</strong>)로 타일을 모두 같은 방향으로 밀어
      <strong>2048</strong>을 만들어 보세요.
    </p>

    <div class="board" id="board">
      <div class="grid">
        <div></div><div></div><div></div><div></div>
        <div></div><div></div><div></div><div></div>
        <div></div><div></div><div></div><div></div>
        <div></div><div></div><div></div><div></div>
      </div>
      <div class="tiles" id="tiles"></div>
      <div class="overlay" id="overlay" hidden>
        <h2 id="overlayTitle">게임 종료</h2>
        <p id="overlayMsg">움직일 수 있는 칸이 없어요.</p>
        <button class="btn" id="overlayBtn">다시 시작</button>
      </div>
    </div>

    <div class="ctrl">
      <button class="btn btn--ghost" id="undo">↶ 되돌리기</button>
      <button class="btn" id="restart">새 게임</button>
    </div>
  </div>

  <script src="script.js"></script>
<script defer src="https://static.cloudflareinsights.com/beacon.min.js/v4513226cdae34746b4dedf0b4dfa099e1781791509496" integrity="sha512-ZE9pZaUXND66v380QUtch/5sE9tPFh2zg45pR2PB0CVkCtOREv2AJKkSidISWkysEuQ0EH8faUU5du78bx87UQ==" data-cf-beacon='{"version":"2024.11.0","token":"c7ff09459b034bca86d316da146b68be","r":1,"server_timing":{"name":{"cfCacheStatus":true,"cfEdge":true,"cfExtPri":true,"cfL4":true,"cfOrigin":true,"cfSpeedBrain":true},"location_startswith":null}}' crossorigin="anonymous"></script>
</body>
</html>
